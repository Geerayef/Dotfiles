# ~ Look ------------------------------------------------------------------- ~ #

include batman.conf
background_opacity 1
cursor_shape block
cursor_blink_interval 0
wayland_titlebar_color system
linux_display_server wayland
# Fonts (PostScript font name: `kitty +list-fonts --psnames`)
font_size 12.0
force_ltr yes
disable_ligatures never
font_family family="IosevkaTerm Nerd Font Mono"
bold_font family="IosevkaTerm Nerd Font Mono" style="Bold"
italic_font family="IosevkaTerm Nerd Font Mono" style="Light Oblique"
bold_italic_font family="IosevkaTerm Nerd Font Mono" style="Bold Oblique"
modify_font cell_height 200%
modify_font underline_position -150%

hide_window_decorations yes
box_drawing_scale 0.001, 0.3, 0.6, 0.9
tab_bar_style hidden
# tab_separator " "
# tab_bar_min_tabs 0
# tab_bar_margin_width 92.0
# tab_bar_margin_color #010204
# tab_bar_background #010204
# active_tab_foreground #010204
# active_tab_background #FFF779
# active_tab_font_style bold
# inactive_tab_foreground #D9E4DB
# inactive_tab_background #010204
# inactive_tab_font_style italic
# tab_title_template " {tab.active_oldest_exe} {tab.active_oldest_wd.replace('/home/tib', '~')} "
remember_window_size no
enabled_layouts splits
window_border_width 0.1pt
draw_minimal_borders yes
window_padding_width 0
placement_strategy center
active_border_color #FFF779
inactive_border_color #36A3D9
text_fg_override_threshold 4.5 ratio
underline_hyperlinks always

# ~ Behaviour -------------------------------------------------------------- ~ #

allow_cloning no
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 128
close_on_child_death no
editor .
enable_audio_bell no
env CURRENT_TERM=kitty
input_delay 3
listen_on unix:@kitty
repaint_delay 32
scrollback_lines 3000
scrollback_pager moor
shell .
shell_integration no-cursor
sync_to_monitor yes
update_check_interval 0
visual_bell_duration 0.0

# ~ Keys ------------------------------------------------------------------- ~ #

clear_all_shortcuts yes

map kitty_mod+0 change_font_size all 0
map kitty_mod+plus change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0

# Clipboard
map kitty_mod+c copy_to_clipboard
map kitty_mod+v paste_from_clipboard
map kitty_mod+s paste_from_selection
map kitty_mod+o pass_selection_to_program
map kitty_mod+y new_window nvim @selection

