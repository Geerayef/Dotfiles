# ~ Hyprlock

$mintCream = rgba(217, 228, 219, 1)
$jet = rgba(55, 54, 67, 1)
$ebony = rgba(86, 88, 72, 1)
$cadetGray = rgba(134, 144, 154, 1)
$raisinBlack = rgba(43, 42, 48, 1)
$citron = rgba(215, 204, 117, 1)
$paynesGray = rgba(94, 104, 110, 1)
$charcoal = rgba(74, 81, 92, 1)
$dragonInk = rgba(1, 2, 4, 1)
$lotusYellow = rgba(255, 247, 121, 1)
$emerald = rgba(105, 220, 158, 1)
$rustyRed = rgba(218, 47, 67, 1)
$gunmetal = rgba(23, 96, 135, 1)

general {
    hide_cursor = true
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/Pictures/Wallpapers/Lance Anderson - Rock formations off of a black sand beach in Iceland.png
    blur_passes = 1
    blur_size = 4
}

input-field {
    monitor = eDP-1
    size = 300, 50
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.1
    dots_center = true
    dots_rounding = -1
    outer_color = $raisinBlack
    inner_color = $dragonInk
    font_color = $mintCream
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground='##cdd6f4'>Password</span>
    hide_input = false
    rounding = -1
    check_color = $emerald
    fail_color = $rustyRed
    fail_text = <b>$FAIL <b>($ATTEMPTS)</b></b>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    position = 0, -20
    halign = center
    valign = center
}

# ~ Clock ------------------------------------------------------------------ ~ #

label {
    monitor = eDP-1
    text = $TIME
    shadow_size = 1
    shadow_passes = 1
    shadow_boost = 0.5
    color = $mintCream
    font_size = 65
    font_family = Iosevka
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor = eDP-1
    text = cmd[update:60000] echo "<span foreground='##cdd6f4'>$(date +'%d. %B, %A')</span>"
    shadow_size = 1
    shadow_passes = 1
    shadow_boost = 0.5
    color = $mintCream
    font_size = 20
    font_family = Iosevka
    position = 0, 20
    halign = center
    valign = bottom
}
