# ~ Settings --------------------------------------------------------------- ~ #

set -g default-shell "/usr/bin/fish"
set -g bell-action none
set -g visual-bell off
set -g default-terminal "foot"
set -ag terminal-overrides ",foot:RGB"
set -ag terminal-overrides ",foot*:Tc"
set -sa terminal-overrides ",xterm*:Tc"
set -sa terminal-overrides ",wezterm*:Tc"
set -g renumber-windows on
set -g base-index 1
set -g pane-base-index 1

# ~ Variables -------------------------------------------------------------- ~ #

set -g @stamux "foot"

# ~ Keymaps ---------------------------------------------------------------- ~ #

unbind Left
unbind Down
unbind Up
unbind Right
# Prefix
unbind C-b
set -g prefix C-q
bind-key C-q send-prefix
# Tab
unbind c
bind-key t new-window -c "#{pane_current_path}"
# Pane
unbind \"
unbind \%
bind-key s split-window -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"
# Focus
bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R
# Yank
unbind \[
bind-key c copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys copy-selection-and-cancel

# ~ Statusline ------------------------------------------------------------- ~ #

run-shell "bash ~/.config/tmux/plugins/stamuxline/stamux.tmux"

# ~ Plugins ---------------------------------------------------------------- ~ #

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "christoomey/vim-tmux-navigator"

run "~/.config/tmux/plugins/tpm/tpm"
