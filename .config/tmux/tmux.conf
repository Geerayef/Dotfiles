# ~ Settings --------------------------------------------------------------- ~ #

set-option -g default-shell "/usr/bin/fish"
set -g bell-action none
set -g visual-bell off
set -g default-terminal "foot"
set -ag terminal-overrides ",foot:RGB"
set-option -ag terminal-overrides ",foot*:Tc"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-overrides ",wezterm*:Tc"

# ~ Variables -------------------------------------------------------------- ~ #

set -g @stamux "foot"

# ~ Keymaps ---------------------------------------------------------------- ~ #

# Prefix
unbind C-b
set -g prefix C-q
bind C-q send-prefix
# Window
unbind Left
unbind Down
unbind Up
unbind Right
# Focus
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
# Yank C-[
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys copy-selection-and-cancel

# ~ Statusline ------------------------------------------------------------- ~ #

run-shell "bash ~/.config/tmux/plugins/stamuxline/stamux.tmux"

# ~ Plugins ---------------------------------------------------------------- ~ #

set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "christoomey/vim-tmux-navigator"

run "~/.config/tmux/plugins/tpm/tpm"
